name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Download ffprobe
        run: |
          curl -L -o ffprobe.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          7z e ffprobe.zip -o. ffprobe.exe -r -y
        shell: cmd

      - name: Build EXE
        run: pyinstaller capcut_premiere.spec --distpath dist --workpath build

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: CapCut-XML-Export-Tool-Windows
          path: |
            dist/CapCut XML Export Tool.exe
            dist/ffprobe.exe

      - name: Create GitHub Release and attach files
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/CapCut XML Export Tool.exe
            dist/ffprobe.exe
