name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Download ffprobe
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          Get-ChildItem -Path ffmpeg_tmp -Recurse -Filter "ffprobe.exe" | Copy-Item -Destination .
          if (!(Test-Path "ffprobe.exe")) { throw "ffprobe.exe not found" }
          Write-Host "ffprobe.exe extracted successfully"

      - name: Build EXE
        run: pyinstaller capcut_premiere.spec --distpath dist --workpath build

      - name: Copy ffprobe to dist
        run: copy ffprobe.exe dist\ffprobe.exe
        shell: cmd

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CapCut-XML-Export-Tool-Windows
          path: |
            dist/CapCut XML Export Tool.exe
            dist/ffprobe.exe

      - name: Create GitHub Release and attach files
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/CapCut XML Export Tool.exe
            dist/ffprobe.exe
